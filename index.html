    // 粒子特效：点击屏幕生成爱心粒子
    function initParticles() {
      const container = document.getElementById('particle-container');
      let particles = [];

      function createParticle(x, y) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        const size = 5 + Math.random() * 10;
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        particle.style.left = `${x - size/2}px`;
        particle.style.top = `${y - size/2}px`;
        particle.style.backgroundColor = `rgba(${Math.random()*255|0}, ${Math.random()*255|0}, ${Math.random()*255|0}, 0.8)`;
        
        container.appendChild(particle);
        particles.push({
          el: particle,
          x: x,
          y: y,
          vx: (Math.random() - 0.5) * 5,
          vy: (Math.random() - 0.8) * 5,
          gravity: 0.1,
          alpha: 1,
          size: size
        });

        // 动画
        const animate = () => {
          for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.vy += p.gravity;
            p.x += p.vx;
            p.y += p.vy;
            p.alpha -= 0.02;
            p.size -= 0.1;

            p.el.style.left = `${p.x - p.size/2}px`;
            p.el.style.top = `${p.y - p.size/2}px`;
            p.el.style.opacity = p.alpha;
            p.el.style.width = `${p.size}px`;
            p.el.style.height = `${p.size}px`;

            if (p.alpha <= 0 || p.size <= 0) {
              p.el.remove();
              particles.splice(i, 1);
            }
          }
          requestAnimationFrame(animate);
        };
        animate();
      }

      // 点击生成粒子
      document.addEventListener('click', (e) => {
        createParticle(e.clientX, e.clientY);
      });
      document.addEventListener('touchstart', (e) => {
        createParticle(e.touches[0].clientX, e.touches[0].clientY);
      });
    }
